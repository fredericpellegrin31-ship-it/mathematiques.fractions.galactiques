<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractions Galactiques</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #000;
            touch-action: manipulation;
            overflow: hidden;
            margin: 0;
            color: white;
        }
        
        h1, h2 { font-family: 'Fredoka One', cursive; }

        .btn-pop {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .btn-pop:active { transform: scale(0.95); }

        .game-shell {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: black;
            overflow: hidden;
        }

        .star-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background-image: 
                radial-gradient(1.5px 1.5px at 25% 25%, #fff 100%, transparent),
                radial-gradient(1.2px 1.2px at 50% 50%, #fff 100%, transparent),
                radial-gradient(2px 2px at 75% 75%, #fff 100%, transparent),
                radial-gradient(1.5px 1.5px at 10% 80%, #fff 100%, transparent),
                radial-gradient(2px 2px at 90% 20%, #fff 100%, transparent);
            background-size: 600px 600px;
            animation: starScroll 15s linear infinite;
        }

        @keyframes starScroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(-50%) translateY(0px); }
            50% { transform: translateY(-50%) translateY(-10px); }
        }
        @keyframes engine {
            0%, 100% { opacity: 0.8; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.3); }
        }
        @keyframes hit-pivot {
            0% { transform: translateY(-50%) rotate(0deg); }
            25% { transform: translateY(-50%) rotate(-15deg); }
            75% { transform: translateY(-50%) rotate(15deg); }
            100% { transform: translateY(-50%) rotate(0deg); }
        }
        
        @keyframes explosion-boom {
            0% { transform: scale(0.1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 1; filter: brightness(2); }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .ship-float { animation: float 3s ease-in-out infinite; }
        .ship-hit { animation: hit-pivot 0.2s ease-in-out 3; }
        .engine-glow { animation: engine 0.2s ease-in-out infinite; transform-origin: left; }
        
        .laser-projectile { 
            height: 4px; 
            width: 40px;
            background: #ef4444; 
            box-shadow: 0 0 20px #ef4444; 
            position: absolute;
            left: 85px; 
            top: 50%;
            transform: translateY(-50%);
            z-index: 5;
            display: none;
            border-radius: 2px;
        }
        
        .explosion-particle {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #fbbf24 0%, #f97316 50%, #ef4444 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            display: none;
        }
        .explosion-particle.active {
            display: block;
            animation: explosion-boom 0.6s ease-out forwards;
        }

        .fraction-display {
            font-size: 2rem;
            line-height: 1;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            color: white;
            font-weight: bold;
        }
        .fraction-line {
            height: 3px;
            width: 100%;
            background: white;
            margin: 2px 0;
        }

        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(800px) rotate(720deg); opacity: 0; }
        }

        /* Classes de feedback pour les boutons */
        .btn-correct {
            border: 4px solid #10b981 !important;
            background-color: #ecfdf5 !important;
        }
        .btn-incorrect {
            border: 4px solid #ef4444 !important;
            background-color: #fef2f2 !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2">
    <div class="star-container" id="confetti-container">
        <div class="star-layer"></div>
    </div>

    <div id="app" class="w-full max-w-md game-shell overflow-hidden min-h-[650px] h-[90vh] flex flex-col relative">
        <header class="bg-black/40 text-white p-4 text-center border-b border-white/10 z-20">
            <h1 class="text-2xl tracking-widest uppercase italic">Fractions Galactiques</h1>
        </header>

        <div id="game-view-screen" class="h-44 sm:h-52 relative overflow-hidden bg-black/20">
            <div id="explosion" class="explosion-particle"></div>
            <div id="laser-bolt" class="laser-projectile"></div>

            <!-- Vaisseau spatial -->
            <div id="spaceship" class="absolute left-6 top-1/2 -translate-y-1/2 ship-float z-10 w-20 h-16">
                <svg viewBox="0 0 100 80" class="w-full h-full drop-shadow-2xl">
                    <path d="M10,40 L0,35 L5,40 L0,45 Z" fill="#f97316" class="engine-glow" />
                    <path d="M15,40 Q15,20 40,20 L70,30 Q90,40 70,50 L40,60 Q15,60 15,40" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1" />
                    <path d="M45,25 Q65,25 75,40 Q65,55 45,55 Z" fill="#38bdf8" opacity="0.8" />
                    <path d="M30,25 L20,10 L45,23 Z" fill="#4f46e5" />
                    <path d="M30,55 L20,70 L45,57 Z" fill="#4f46e5" />
                    <rect x="75" y="38" width="8" height="4" fill="#ef4444" rx="1" />
                </svg>
            </div>

            <!-- Bulle Question -->
            <div id="question-bubble" class="hidden absolute left-28 top-1/2 -translate-y-1/2 z-20 bg-indigo-600 px-4 py-2 rounded-xl border-2 border-white shadow-xl flex flex-col items-center min-w-[60px]">
                <div id="target-fraction" class="fraction-display"></div>
            </div>

            <!-- Astéroïde visuel -->
            <div id="asteroid-container" class="absolute right-[-120px] top-1/2 -translate-y-1/2 transition-all z-10 w-24 h-24 flex items-center justify-center">
                 <svg id="asteroid-svg" viewBox="0 0 100 100" class="w-20 h-20 drop-shadow-lg">
                    <path d="M30,10 Q50,0 70,10 Q95,25 90,50 Q95,75 70,90 Q50,100 25,90 Q0,75 5,50 Q0,25 30,10" fill="#4b5563" stroke="#1f2937" stroke-width="2" />
                    <circle cx="35" cy="30" r="5" fill="#1f2937" opacity="0.4" />
                    <circle cx="65" cy="45" r="8" fill="#1f2937" opacity="0.4" />
                    <circle cx="45" cy="70" r="6" fill="#1f2937" opacity="0.4" />
                 </svg>
            </div>

            <div class="absolute bottom-0 left-0 h-1 bg-indigo-500 shadow-[0_0_10px_#6366f1] transition-all w-0" id="timer-bar"></div>
        </div>

        <main class="flex-grow flex flex-col p-6 z-20 overflow-hidden" id="ui-container"></main>

        <footer class="p-3 text-center text-white/30 text-[10px] tracking-widest uppercase">
            Protocoles Mathématiques // Mission CE1-CM2
        </footer>
    </div>

    <script>
        const state = {
            view: 'home', 
            score: 0,
            questionIndex: 0,
            totalQuestions: 10,
            currentQuestion: null,
            isAnswering: false,
            selectedIndex: null,
            message: null,
            timerTimeout: null,
            currentType: 'pie' 
        };

        const denominators = [2, 3, 4, 5, 6];

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            if (type === 'laser') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            } else { 
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            }
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function speakFraction(num, den) {
            const names = { 2: "demi", 3: "tiers", 4: "quart", 5: "cinquième", 6: "sixième" };
            const text = num === 1 ? `un ${names[den]}` : `${num} ${names[den]}s`;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'fr-FR';
                window.speechSynthesis.speak(msg);
            }
        }

        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4caf50', '#8bc34a', '#cddc39', '#ffeb3b', '#ffc107', '#ff9800', '#ff5722'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `confetti-fall ${Math.random() * 3 + 2}s linear forwards`;
                container.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        function getPieSVG(num, den, size = 80, colorOverride = null) {
            const center = size / 2;
            const radius = size * 0.4;
            let paths = "";
            for (let i = 0; i < den; i++) {
                const startAngle = (i * 360) / den - 90;
                const endAngle = ((i + 1) * 360) / den - 90;
                const x1 = center + radius * Math.cos((startAngle * Math.PI) / 180);
                const y1 = center + radius * Math.sin((startAngle * Math.PI) / 180);
                const x2 = center + radius * Math.cos((endAngle * Math.PI) / 180);
                const y2 = center + radius * Math.sin((endAngle * Math.PI) / 180);
                const color = i < num ? (colorOverride || "#6366f1") : "#e2e8f0";
                paths += `<path d="M ${center} ${center} L ${x1} ${y1} A ${radius} ${radius} 0 0 1 ${x2} ${y2} Z" fill="${color}" stroke="#1e293b" stroke-width="1" />`;
            }
            return `<svg viewBox="0 0 ${size} ${size}" class="w-full h-full">${paths}</svg>`;
        }

        function getBarSVG(num, den, size = 80, colorOverride = null) {
            const width = size * 0.8;
            const height = size * 0.4;
            const startX = (size - width) / 2;
            const startY = (size - height) / 2;
            const rectWidth = width / den;
            let rects = "";
            for (let i = 0; i < den; i++) {
                const color = i < num ? (colorOverride || "#10b981") : "#e2e8f0";
                rects += `<rect x="${startX + i * rectWidth}" y="${startY}" width="${rectWidth}" height="${height}" fill="${color}" stroke="#1e293b" stroke-width="1" />`;
            }
            return `<svg viewBox="0 0 ${size} ${size}" class="w-full h-full">${rects}</svg>`;
        }

        function resetAnimation() {
            const asteroid = document.getElementById('asteroid-container');
            const asteroidSvg = document.getElementById('asteroid-svg');
            const timerBar = document.getElementById('timer-bar');
            const laser = document.getElementById('laser-bolt');
            const exp = document.getElementById('explosion');
            
            asteroid.style.transition = 'none';
            asteroid.style.right = '-120px';
            asteroidSvg.style.display = 'block'; 
            
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            laser.style.display = 'none';
            laser.style.left = '85px';
            exp.classList.remove('active');
            
            void asteroid.offsetWidth;
            asteroid.style.transition = 'right 12s linear';
            timerBar.style.transition = 'width 12s linear';
            asteroid.style.right = 'calc(100% - 120px)';
            timerBar.style.width = '0%';
        }

        function triggerLaser() {
            const laser = document.getElementById('laser-bolt');
            const ast = document.getElementById('asteroid-container');
            const astSvg = document.getElementById('asteroid-svg');
            const exp = document.getElementById('explosion');
            const parentRect = document.getElementById('game-view-screen').getBoundingClientRect();
            
            playSound('laser');
            laser.style.display = 'block';
            laser.style.transition = 'left 0.4s ease-in';
            void laser.offsetWidth;
            laser.style.left = '100%';

            setTimeout(() => {
                const astRect = ast.getBoundingClientRect();
                ast.style.transition = 'none';
                astSvg.style.display = 'none'; 
                laser.style.display = 'none';
                playSound('explosion');
                exp.style.left = (astRect.left - parentRect.left + 10) + 'px';
                exp.style.top = (astRect.top - parentRect.top + 10) + 'px';
                exp.classList.add('active');
            }, 350);
        }

        function triggerCollision() {
            const ship = document.getElementById('spaceship');
            const exp = document.getElementById('explosion');
            const shipRect = ship.getBoundingClientRect();
            const parentRect = document.getElementById('game-view-screen').getBoundingClientRect();
            
            ship.classList.remove('ship-float');
            ship.classList.add('ship-hit');
            playSound('explosion');
            exp.style.left = (shipRect.left - parentRect.left + 20) + 'px';
            exp.style.top = (shipRect.top - parentRect.top) + 'px';
            exp.classList.add('active');
            
            setTimeout(() => {
                ship.classList.remove('ship-hit');
                ship.classList.add('ship-float');
            }, 600);
        }

        function nextQuestion() {
            if (state.questionIndex >= state.totalQuestions) { setView('results'); return; }
            state.questionIndex++;
            state.isAnswering = false;
            state.selectedIndex = null;
            state.message = null;
            state.currentType = state.currentType === 'pie' ? 'bar' : 'pie';

            const den = denominators[Math.floor(Math.random() * denominators.length)];
            const num = Math.floor(Math.random() * (den - 1)) + 1;
            let options = [{ num, den }];
            while(options.length < 4) {
                const d = denominators[Math.floor(Math.random() * denominators.length)];
                const n = Math.floor(Math.random() * (d - 1)) + 1;
                if (!options.some(o => (o.num/o.den) === (n/d))) options.push({ num: n, den: d });
            }
            state.currentQuestion = { num, den, options: options.sort(() => Math.random() - 0.5) };

            document.getElementById('question-bubble').classList.remove('hidden');
            document.getElementById('target-fraction').innerHTML = `<span>${num}</span><div class="fraction-line"></div><span>${den}</span>`;
            
            resetAnimation();
            render();
            speakFraction(num, den);

            if(state.timerTimeout) clearTimeout(state.timerTimeout);
            state.timerTimeout = setTimeout(() => { if(!state.isAnswering) handleAnswer(-1); }, 12000);
        }

        function handleAnswer(idx) {
            if (state.isAnswering) return;
            state.isAnswering = true;
            state.selectedIndex = idx;
            if(state.timerTimeout) clearTimeout(state.timerTimeout);
            
            const selected = state.currentQuestion.options[idx];
            const isCorrect = selected && selected.num === state.currentQuestion.num && selected.den === state.currentQuestion.den;

            if (isCorrect) {
                state.score++;
                state.message = { text: "CIBLE DÉTRUITE ! ⚡", type: "success" };
                triggerLaser();
                render();
                setTimeout(nextQuestion, 2000);
            } else {
                state.message = { text: "OUPS ! ÉCHEC DU TIR 💥", type: "error" };
                render();
                
                const checkCol = setInterval(() => {
                    const astRect = document.getElementById('asteroid-container').getBoundingClientRect();
                    const shipRect = document.getElementById('spaceship').getBoundingClientRect();
                    if (astRect.left <= shipRect.right) {
                        clearInterval(checkCol);
                        triggerCollision();
                        setTimeout(nextQuestion, 3000);
                    }
                }, 50);
            }
        }

        function render() {
            const ui = document.getElementById('ui-container');
            const bubble = document.getElementById('question-bubble');

            if (state.view === 'home') {
                bubble.classList.add('hidden');
                ui.innerHTML = `
                    <div class="flex flex-col gap-8 items-center justify-center h-full text-center">
                        <div>
                            <h2 class="text-indigo-400 text-xl uppercase mb-2">Prêt pour le décollage ?</h2>
                            <p class="text-white/60 text-sm px-4">Associe les fractions à leurs formes pour pulvériser les astéroïdes.</p>
                        </div>
                        <button onclick="initAudio(); startGame();" class="btn-pop w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-5 rounded-2xl text-xl shadow-lg border-b-4 border-indigo-800 uppercase">Commencer</button>
                    </div>
                `;
            } else if (state.view === 'play') {
                ui.innerHTML = `
                    <div class="flex flex-col h-full">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] text-white/40 uppercase tracking-widest">Zone de tir ${state.questionIndex}/10</span>
                            <div class="flex gap-2">
                                <span class="text-indigo-400 font-bold">Score: ${state.score}</span>
                                <button onclick="speakFraction(state.currentQuestion.num, state.currentQuestion.den)" class="bg-white/10 p-2 rounded-lg text-white">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217z" /></svg>
                                </button>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 flex-grow pb-2">
                            ${state.currentQuestion.options.map((opt, idx) => {
                                let feedbackClass = "";
                                if (state.isAnswering) {
                                    const isTarget = opt.num === state.currentQuestion.num && opt.den === state.currentQuestion.den;
                                    if (idx === state.selectedIndex) {
                                        feedbackClass = isTarget ? "btn-correct" : "btn-incorrect";
                                    } else if (isTarget) {
                                        feedbackClass = "btn-correct"; // Affiche la bonne réponse si erreur
                                    }
                                }
                                
                                return `
                                <button onclick="handleAnswer(${idx})" 
                                    class="btn-pop rounded-2xl bg-white p-2 flex items-center justify-center shadow-xl border-b-4 border-slate-300 relative overflow-hidden ${feedbackClass}"
                                    ${state.isAnswering ? 'disabled' : ''}>
                                    ${state.currentType === 'pie' ? getPieSVG(opt.num, opt.den) : getBarSVG(opt.num, opt.den)}
                                </button>
                                `;
                            }).join('')}
                        </div>
                        ${state.message ? `
                            <div class="text-center py-2 min-h-[80px]">
                                <div class="font-bold uppercase tracking-widest mb-1 ${state.message.type === 'success' ? 'text-emerald-400' : 'text-rose-500'}">
                                    ${state.message.text}
                                </div>
                                ${state.message.type === 'error' ? `
                                    <div class="text-xs text-white/70">La bonne réponse était :</div>
                                    <div class="flex justify-center mt-1 scale-50 -my-4">
                                        ${state.currentType === 'pie' ? getPieSVG(state.currentQuestion.num, state.currentQuestion.den, 60, "#10b981") : getBarSVG(state.currentQuestion.num, state.currentQuestion.den, 60, "#10b981")}
                                    </div>
                                ` : ''}
                            </div>
                        ` : ''}
                    </div>
                `;
            } else if (state.view === 'results') {
                bubble.classList.add('hidden');
                
                let stars = 0;
                if (state.score === 10) stars = 3;
                else if (state.score >= 7) stars = 2;
                else if (state.score >= 1) stars = 1;

                if (state.score === 10) {
                    createConfetti();
                }

                ui.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full gap-4 text-center">
                        <div class="flex gap-2 mb-2 text-4xl">
                            <span class="${stars >= 1 ? 'text-yellow-400' : 'text-gray-600'}">★</span>
                            <span class="${stars >= 2 ? 'text-yellow-400' : 'text-gray-600'}">★</span>
                            <span class="${stars >= 3 ? 'text-yellow-400' : 'text-gray-600'}">★</span>
                        </div>
                        <h2 class="text-2xl font-bold uppercase tracking-widest">Rapport de Mission</h2>
                        <div class="bg-white/5 p-6 rounded-3xl border border-white/10 my-4 w-full">
                            <p class="text-[10px] uppercase text-white/40 mb-1">Score final</p>
                            <p class="text-5xl font-bold text-indigo-400">${state.score}/10</p>
                            <p class="mt-4 text-sm text-white/60">
                                ${state.score === 10 ? "MISSION PARFAITE ! Amiral des Fractions !" : 
                                  state.score >= 7 ? "Excellent travail de navigation !" : 
                                  state.score >= 5 ? "Pas mal, encore un peu d'entraînement !" : 
                                  "Retourne à l'académie pour réviser !"}
                            </p>
                        </div>
                        <button onclick="setView('home')" class="btn-pop w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl uppercase shadow-lg border-b-4 border-indigo-800">Nouvelle Mission</button>
                    </div>
                `;
            }
        }

        function setView(v) { state.view = v; render(); }
        function startGame() {
            state.score = 0; state.questionIndex = 0;
            state.view = 'play'; state.currentQuestion = null;
            nextQuestion();
        }

        window.onload = () => render();
    </script>
</body>
</html>
